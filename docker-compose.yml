services:
  # в”Ђв”Ђв”Ђ AI Service (FastAPI + e5-small-v2) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Postgres chбєЎy trГЄn HOST machine (khГґng trong Docker) Д‘б»ѓ tiбєїt kiб»‡m RAM
  fbuai:
    build: ./ai-service
    container_name: fbuai
    ports:
      - "8001:8001"
    volumes:
      - ./ai-service:/app
      # Cache model Д‘б»ѓ khГґng tбєЈi lбєЎi mб»—i lбє§n restart
      - ai_model_cache:/root/.cache/huggingface
      # Mount _clean.md files cho reingest
      - ./postgres/pdf_output/md_rag:/app/md_rag:ro
    environment:
      - DB_HOST=host.docker.internal # в†’ PostgreSQL trГЄn host
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_PORT=${POSTGRES_PORT:-5432}
      - GROQ_API_KEY=${GROQ_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 1500M
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s # warm-up e5-small + psycopg2 pool
    restart: always

  # в”Ђв”Ђв”Ђ Spring Boot API в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  api:
    image: eclipse-temurin:17-jdk-alpine
    container_name: spring_api
    working_dir: /app
    volumes:
      - ./spring-api/fbu_chat:/app
    ports:
      - "8080:8080"
    command: sh -c "sed -i 's/\r$//' ./mvnw && chmod +x ./mvnw && ./mvnw spring-boot:run"
    depends_on:
      minio:
        condition: service_healthy
      fbuai:
        condition: service_healthy
    environment:
      - SPRING_FLYWAY_REPAIR_ON_MIGRATE=true
      - SPRING_FLYWAY_BASELINE_ON_MIGRATE=true

      # Spring kбєїt nб»‘i thбєіng vГ o host postgres
      - SPRING_DATASOURCE_URL=jdbc:postgresql://host.docker.internal:${POSTGRES_PORT:-5432}/${POSTGRES_DB}?sslmode=disable
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}

      # MinIO Config
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}

      - AI_SERVICE_URL=http://fbuai:8001
      - GROQ_API_KEY=${GROQ_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure

  # в”Ђв”Ђв”Ђ Chat UI (Nginx) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  chatui:
    image: nginx:alpine
    container_name: fbu_chatui
    ports:
      - "80:80"
    volumes:
      - ./chat-ui:/usr/share/nginx/html:ro
      - ./chat-ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: on-failure

  # в”Ђв”Ђв”Ђ MinIO (S3 Storage) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  minio:
    image: minio/minio:latest
    container_name: fbu_minio
    ports:
      - "9000:9000"       # Port dГ nh cho API kбєїt nб»‘i tб»« Spring Boot
      - "9001:9001"       # Port dГ nh cho giao diб»‡n Web Console
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"

volumes:
  ai_model_cache: # HuggingFace model cache persistent
  minio_data:
