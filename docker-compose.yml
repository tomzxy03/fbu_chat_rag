services:
  # ─── AI Service (FastAPI + e5-small-v2) ─────────────────────────
  # Postgres chạy trên HOST machine (không trong Docker) để tiết kiệm RAM
  fbuai:
    build: ./ai-service
    container_name: fbuai
    ports:
      - "8001:8001"
    volumes:
      - ./ai-service:/app
      # Cache model để không tải lại mỗi lần restart
      - ai_model_cache:/root/.cache/huggingface
      # Mount _clean.md files cho reingest
      - ./postgres/pdf_output/md_rag:/app/md_rag:ro
    environment:
      - DB_HOST=host.docker.internal # → PostgreSQL trên host
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_PORT=${POSTGRES_PORT:-5432}
      - GROQ_API_KEY=${GROQ_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 1500M
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s # warm-up e5-small + psycopg2 pool
    restart: always

  # ─── Spring Boot API ────────────────────────────────────────────
  api:
    image: eclipse-temurin:21-jdk
    container_name: spring_api
    env_file:
      - .env
    working_dir: /app
    volumes:
      - ./spring-api/fbu_chat:/app
      - /home/debian-server/coccoc-dist:/app/libs
    ports:
      - "8080:8080"
    command: >
      sh -c "sed -i 's/\r$//' ./mvnw && chmod +x ./mvnw && 
      ./mvnw clean spring-boot:run 
      -Dspring-boot.run.arguments='--spring.flyway.baseline-on-migrate=false --spring.flyway.repair-on-migrate=true' 
      -Dspring-boot.run.jvmArguments='-Djava.library.path=/app/libs -Dcoccoc_tokenizer_dict_path=/app/libs/dicts'"
    depends_on:
      minio:
        condition: service_healthy
      fbuai:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://host.docker.internal:${POSTGRES_PORT:-5432}/${POSTGRES_DB}?currentSchema=public,extensions&sslmode=disable
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - AI_SERVICE_URL=http://fbuai:8001
      - GROQ_API_KEY=${GROQ_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure

  # ─── Chat UI (Nginx) ──────────────────────────────────────────
  chatui:
    build: ./chat-ui  
    container_name: fbu_chatui
    ports:
      - "80:80"
    volumes:
      - ./chat-ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: on-failure

  # ─── MinIO (S3 Storage) ──────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: fbu_minio
    env_file:
      - .env
     # Đảm bảo .env chứa MINIO_ROOT_USER, MINIO_ROOT_PASSWORD, MINIO_ENDPOINT
    ports:
      - "9000:9000"       # Port dành cho API kết nối từ Spring Boot
      - "9001:9001"       # Port dành cho giao diện Web Console
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ai_model_cache: # HuggingFace model cache persistent
  minio_data:
