spring:
  application:
    name: fbu_chat

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ragdb?sslmode=disable}
    username: ${SPRING_DATASOURCE_USERNAME:raguser}
    password: ${SPRING_DATASOURCE_PASSWORD:ragpass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none 
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false 
    repair-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 55MB



server:
  port: 8080
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

app:
  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8001}
    timeout-seconds: 60
  jwt:
    secret: ${JWT_SECRET:fbu-chat-super-secret-key-2026-must-be-at-least-32-bytes-long}
    access-expiration-ms: 604800000   # 7 days
    refresh-expiration-ms: 2592000000 # 30 days

logging:
  level:
    com.tomzxy.fbu_chat: INFO
    org.springframework.web: WARN

groq:
  api:
    key: ${GROQ_API_KEY:}
