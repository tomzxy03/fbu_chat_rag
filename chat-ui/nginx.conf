server {
    listen 80;
    server_name _;
    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # Tailscale cert — thay <HOSTNAME> bằng hostname thực: debian-server.tail12345.ts.net
    ssl_certificate     /var/lib/tailscale/certs/<HOSTNAME>.crt;
    ssl_certificate_key /var/lib/tailscale/certs/<HOSTNAME>.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Chat UI static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Spring Boot
    location /api/ {
        proxy_pass http://spring_api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        client_max_body_size 55M;
    }

    # Public object URLs returned by Spring use /minio/<bucket>/<object>
    location /minio/ {
        proxy_pass http://fbu_minio:9000/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
    }

    # Health check for AI service
    location /health {
        proxy_pass http://spring_api:8080;
    }
}
