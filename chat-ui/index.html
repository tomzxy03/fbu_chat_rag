<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FBU Chat - Trợ lý AI Đại học FBU</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <!-- Login Modal (overlay) -->
    <div id="login-modal" class="modal-overlay hidden">
        <div class="login-card">
            <button class="modal-close" onclick="closeLoginModal()">✕</button>
            <div class="login-logo">🎓</div>
            <h1>FBU Chat</h1>
            <p class="login-subtitle">Đăng nhập để lưu lịch sử trò chuyện</p>
            <div id="login-tab" class="tab-switch">
                <button class="tab active" data-tab="login">Đăng nhập</button>
                <button class="tab" data-tab="register">Đăng ký</button>
            </div>
            <form id="login-form" class="auth-form">
                <input type="text" id="login-username" placeholder="Tên đăng nhập" required autocomplete="username">
                <input type="password" id="login-password" placeholder="Mật khẩu" required
                    autocomplete="current-password">
                <button type="submit" class="btn-primary">Đăng nhập</button>
            </form>
            <form id="register-form" class="auth-form hidden">
                <input type="text" id="reg-username" placeholder="Tên đăng nhập (3-50 ký tự)" required>
                <input type="password" id="reg-password" placeholder="Mật khẩu (tối thiểu 6 ký tự)" required>
                <button type="submit" class="btn-primary">Đăng ký</button>
            </form>
            <p id="auth-error" class="error-msg hidden"></p>
        </div>
    </div>

    <!-- Chat Screen (always visible) -->
    <div id="chat-screen" class="chat-screen">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🎓 FBU Chat</h2>
                <button id="new-chat-btn" class="btn-icon" title="Cuộc trò chuyện mới">＋</button>
            </div>
            <div id="conversation-list" class="conversation-list"></div>
            <!-- Admin Upload Section -->
            <div id="admin-section" class="admin-section hidden">
                <h3>📁 Upload tài liệu</h3>
                <form id="upload-form" class="upload-form">
                    <input type="file" id="upload-file" accept=".pdf,.docx,.doc,.txt,.json,.md,.csv,.png,.jpg,.jpeg">
                    <div class="upload-options">
                        <input type="number" id="upload-year" value="2026" min="2020" max="2030">
                        <select id="upload-doctype">
                            <option value="quy_che">Quy chế</option>
                            <option value="thong_bao">Thông báo</option>
                            <option value="huong_dan">Hướng dẫn</option>
                            <option value="general">Chung</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-upload">Upload</button>
                </form>
                <p id="upload-status" class="upload-status"></p>
            </div>
            <div class="sidebar-footer">
                <span id="user-info">Khách</span>
                <button id="auth-btn" class="btn-login">Đăng nhập</button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <div class="chat-header">
                <h3 id="chat-title">Cuộc trò chuyện mới</h3>
                <span id="login-hint" class="login-hint">💡 <a href="#" onclick="openLoginModal(); return false;">Đăng
                        nhập</a> để lưu lịch sử</span>
            </div>
            <div id="messages" class="messages">
                <div class="welcome-msg">
                    <div class="welcome-icon">🤖</div>
                    <h2>Xin chào! Tôi là trợ lý AI của FBU</h2>
                    <p>Hãy hỏi tôi về quy chế, quy trình, hoặc thông tin của trường.</p>
                    <div class="suggestions">
                        <button class="suggestion" onclick="askSuggestion(this)">Điều kiện tốt nghiệp?</button>
                        <button class="suggestion" onclick="askSuggestion(this)">Học bổng toàn phần?</button>
                        <button class="suggestion" onclick="askSuggestion(this)">Điểm rèn luyện?</button>
                    </div>
                </div>
            </div>
            <form id="chat-form" class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Nhập câu hỏi..." autocomplete="off">
                <button type="submit" class="btn-send" id="send-btn">➤</button>
            </form>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
